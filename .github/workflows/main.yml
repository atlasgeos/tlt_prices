name: TalaadThai Scraper to Supabase

on:
  schedule:
    - cron: '0 1 * * *' # รันทุกวันเวลา 08:00 น. (เวลาไทย)
  workflow_dispatch: # ปุ่มสำหรับกดรันเองเพื่อทดสอบ

jobs:
  scrape-and-upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Chrome and WebDriver
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable
          # ระบบจะใช้ Selenium Manager ในการจัดการ Driver ให้อัตโนมัติในเวอร์ชันใหม่ๆ

      - name: Install Dependencies
        run: |
          pip install selenium beautifulsoup4 supabase webdriver-manager postgrest

      - name: Run Scraper and Upload to Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python upsert.py
